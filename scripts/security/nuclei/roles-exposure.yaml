id: canalgov-roles-exposure

info:
  name: CanalGov Roles Exposure
  author: codex
  severity: medium
  description: Detecta exposicao de roles e permissoes para usuario autenticado sem privilegio administrativo.
  tags: canalgov,bac,exposure,roles

variables:
  cookie: "{{cookie}}"

http:
  - raw:
      - |
        GET /api/v1/roles HTTP/1.1
        Host: {{Hostname}}
        Cookie: {{cookie}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '"permissions"'
        part: body
